# ============================================================
# netlify.toml — Netlify deploy configuration for 4atatime
# ============================================================

[build]
  publish = "."      # The whole repo is the site (no build step needed)
  command = ""       # No build command — pure HTML/CSS/JS

# ── Redirects ─────────────────────────────────────────────
# Clean URLs: /uiux → /uiux.html
# Also handles old Framer URLs so any saved links still work.

[[redirects]]
  from = "/index_uiux"
  to   = "/uiux.html"
  status = 301

[[redirects]]
  from = "/index_graphics"
  to   = "/grafix.html"
  status = 301

[[redirects]]
  from = "/index_ink"
  to   = "/ink.html"
  status = 301

[[redirects]]
  from = "/index_music"
  to   = "/music.html"
  status = 301

[[redirects]]
  from = "/index_contact"
  to   = "/contact.html"
  status = 301

[[redirects]]
  from = "/wip_coming-soon"
  to   = "/wip.html"
  status = 301

# ── Headers ────────────────────────────────────────────────
# Security headers + performance

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache fonts aggressively — they never change
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for a week
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
